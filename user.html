<!DOCTYPE html>
<html>
<head>
<title>User Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
 font-family:Poppins;
 background:linear-gradient(135deg,#667eea,#764ba2);
 padding:20px;
}

.box{
 background:#fff;
 padding:25px;
 border-radius:15px;
 max-width:420px;
 margin:auto;
 box-shadow:0 10px 25px rgba(0,0,0,.25);
 text-align:center;
}

input{
 width:90%;
 padding:10px;
 border-radius:8px;
 border:1px solid #ccc;
 margin-bottom:10px;
}

button{
 background:#28a745;
 color:#fff;
 border:none;
 padding:8px 14px;
 border-radius:8px;
 cursor:pointer;
 font-weight:600;
}

button:hover{background:#1f8a38}

.task{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:8px;
 margin:6px 0;
 border-radius:8px;
 background:#f3f3f3;
}

.done{
 text-decoration:line-through;
 color:green;
 background:#e6ffe6;
}

.msg{
 color:#777;
 margin-top:10px;
}
</style>
</head>

<body>
<div class="box">
<h2>👤 User Tasks</h2>
<input id="uname" placeholder="Enter Name">
<br>
<button onclick="loadTasks()">View Tasks</button>
<div id="list"></div>
<div id="msg" class="msg"></div>
</div>
<audio id="notifySound" src="notification.mp3" preload="auto"></audio>

<script>
let currentUser="";
let lastTaskCount=0;
let watcherStarted=false;
let remindedTasks={};

// Load last user automatically
window.onload=()=>{
 let saved=localStorage.getItem("lastUser");
 if(saved){
  uname.value=saved;
  loadTasks();
 }
}

function loadTasks(){

 if(uname.value.trim()==""){
  alert("Please enter name first!");
  return;
 }

 currentUser=uname.value.trim();
 localStorage.setItem("lastUser",currentUser);

 if(!watcherStarted){
   startWatcher();
   startDeadlineChecker();
   watcherStarted=true;
 }

 let key="task_"+currentUser;
 let data=JSON.parse(localStorage.getItem(key))||[];

 list.innerHTML="";
 msg.innerHTML="";

 if(data.length==0){
  msg.innerHTML="No tasks assigned by admin.";
  lastTaskCount=0;
  return;
 }

 lastTaskCount=data.length;

 data.forEach((t,i)=>{

  let deadlineText="";
  if(t.deadline){
    let d=new Date(t.deadline);
    deadlineText=`<small style="color:#ff5722">⏰ ${d.toLocaleString()}</small>`;
  }

  list.innerHTML+=`
   <div class="task ${t.done?'done':''}">
    <div>
      <span>${t.task}</span><br>
      ${deadlineText}
    </div>
    ${t.done?'<span>✔</span>':`<button onclick="markDone(${i})">Done</button>`}
   </div>`;
 });
}

// 🔔 New Task Notification
function startWatcher(){
 setInterval(()=>{
  if(!currentUser) return;

  let key="task_"+currentUser;
  let data=JSON.parse(localStorage.getItem(key))||[];

  if(data.length>lastTaskCount){
   playSound();
   alert("📢 New Task Assigned!");
   loadTasks();
  }

 },2000);
}

// ⏰ Deadline Checker
function startDeadlineChecker(){
 setInterval(()=>{
  if(!currentUser) return;

  let key="task_"+currentUser;
  let data=JSON.parse(localStorage.getItem(key))||[];
  let now=new Date().getTime();

  data.forEach((t,i)=>{
   if(t.deadline && !t.done){

    let deadlineTime=new Date(t.deadline).getTime();

    if(now>=deadlineTime && !remindedTasks[i]){
      remindedTasks[i]=true;
      playSound();
      alert("⏰ Deadline reached for task:\n"+t.task);
    }
   }
  });

 },60000); // every 1 minute
}

function playSound(){
 const audio=document.getElementById("notifySound");
 audio.currentTime=0;
 audio.play().catch(()=>{});
}

function markDone(i){
 let key="task_"+currentUser;
 let d=JSON.parse(localStorage.getItem(key));
 d[i].done=true;
 localStorage.setItem(key,JSON.stringify(d));
 loadTasks();
}
</script>


</body>
</html>
