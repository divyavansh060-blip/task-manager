<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set New Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 min-height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background:linear-gradient(135deg,#667eea,#764ba2);
 font-family:Poppins;
}

.box{
 background:white;
 padding:30px;
 border-radius:18px;
 width:350px;
 text-align:center;
 box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

h2{
 color:#6a1b9a;
 margin-bottom:10px;
}

p{
 color:#555;
 font-size:14px;
}

input{
 width:100%;
 padding:12px;
 margin:12px 0;
 border-radius:10px;
 border:1px solid #ccc;
 outline:none;
}

button{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:linear-gradient(135deg,#4caf50,#2e7d32);
 color:white;
 font-weight:bold;
 cursor:pointer;
 font-size:15px;
 margin-top:10px;
}

button:hover{
 opacity:0.9;
}

#msg{
 margin-top:10px;
 font-size:14px;
}
</style>
</head>

<body>

<div class="box">
<h2>🔑 Set New Password</h2>
<p>Enter your new password below</p>

<input id="newPass" type="password" placeholder="New Password">
<input id="confirmPass" type="password" placeholder="Confirm Password">

<button onclick="setPassword()">Update Password</button>

<p id="msg"></p>

<p style="margin-top:10px;color:blue;cursor:pointer;"
   onclick="location.href='index.html'">
⬅ Back to Login
</p>
</div>

<script>
function setPassword(){

 let p1 = document.getElementById("newPass").value.trim();
 let p2 = document.getElementById("confirmPass").value.trim();
 let msg = document.getElementById("msg");

 if(p1=="" || p2==""){
   alert("Fill all fields");
   return;
 }

 if(p1 !== p2){
   alert("Passwords do not match");
   return;
 }

 let email = localStorage.getItem("reset_email");

 localStorage.setItem(email+"_pass",btoa(p1));

 msg.style.color="green";
 msg.innerText="Password updated successfully";

 setTimeout(()=>{
   location.href="index.html";
 },2000);
}
</script>

</body>
</html>
