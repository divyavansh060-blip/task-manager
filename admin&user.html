/* GET CURRENT USER KEY */
function getCurrentUserKey(){
  let c = JSON.parse(localStorage.current || "null");
  if(!c) return null;
  return c.role === "user" ? "user_" + c.userid : "ADMIN";
}

/* LOAD PROFILE */
function loadProfile(){
  let key = getCurrentUserKey();
  if(!key) return;

  let user = JSON.parse(localStorage.getItem(key) || "{}");

  let el = getProfileElements();

  if(!el.name) return;

  el.name.value = user.name || "";
  el.email.value = user.email || "";
  el.pic.src = user.pic || "https://via.placeholder.com/80";

  document.getElementById("userName").innerText =
    "User : " + (user.name || "User");

  updateTopProfile();
}

function updateTopProfile(){
  let key = getCurrentUserKey();
  if(!key) return;

  let user = JSON.parse(localStorage.getItem(key) || "{}");

  let pic = user.pic || "https://via.placeholder.com/40";
  let name = user.name || "User";

  let adminPic = document.getElementById("topProfilePicAdmin");
  let adminName = document.getElementById("topProfileNameAdmin");

  let userPic = document.getElementById("topProfilePicUser");
  let userName = document.getElementById("topProfileNameUser");

  if(adminPic) adminPic.src = pic;
  if(adminName) adminName.innerText = name;

  if(userPic) userPic.src = pic;
  if(userName) userName.innerText = name;
}


function saveProfile(){
  let key = getCurrentUserKey();
  if(!key) return;

  let el = getProfileElements();
console.log("Profile Elements:", el);
  // ✅ safety check
  if(!el.name || !el.email || !el.pic){
    alert("Profile elements not found");
    return;
  }

  let user = JSON.parse(localStorage.getItem(key) || "{}");

  user.name = el.name.value.trim();
  user.email = el.email.value.trim();

  if(!user.name){
    alert("Name required");
    return;
  }
  
  if(el.pic.dataset.temp){
    user.pic = el.pic.dataset.temp;
  }

  localStorage.setItem(key, JSON.stringify(user));

let current = JSON.parse(localStorage.current || "{}");
  current.name = user.name;
  localStorage.current = JSON.stringify(current);

  showToast("✅ Profile Updated", "success");

  loadProfile();
  renderUserTasks?.();
  renderAdmin?.();
  updateTopProfile();
}

function getProfileElements(){
  let adminActive = document.getElementById("adminBox").classList.contains("active");
  let userActive = document.getElementById("userBox").classList.contains("active");

  if(adminActive){
    return {
      name: document.getElementById("profileNameAdmin"),
      email: document.getElementById("profileEmailAdmin"),
      pic: document.getElementById("profilePicAdmin")
    };
  }

  if(userActive){
    return {
      name: document.getElementById("profileNameUser"),
      email: document.getElementById("profileEmailUser"),
      pic: document.getElementById("profilePicUserBox")
    };
  }

  return { name:null, email:null, pic:null };
}

function setupUploadListeners(){
  let adminUpload = document.getElementById("uploadPicAdmin");
  let userUpload = document.getElementById("uploadPicUser");

  if(adminUpload){
    adminUpload.addEventListener("change", handleImageUpload);
  }

  if(userUpload){
    userUpload.addEventListener("change", handleImageUpload);
  }
}

function handleImageUpload(){
  let file = this.files[0];
  if(!file) return;

  if(file.size > 1024 * 1024){
    alert("Image too large! Max 1MB");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(e){
    let img = new Image();
    img.src = e.target.result;

    img.onload = function(){
      let canvas = document.createElement("canvas");
      let size = 150;
      canvas.width = size;
      canvas.height = size;

      let ctx = canvas.getContext("2d");

      let min = Math.min(img.width, img.height);
      let sx = (img.width - min) / 2;
      let sy = (img.height - min) / 2;

      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);

      let compressed = canvas.toDataURL("image/jpeg", 0.7);

      let el = getProfileElements(); // ✅ define here
      if(!el.pic){
        alert("Profile image element not found");
        return;
      }

      el.pic.src = compressed;
      el.pic.dataset.temp = compressed;
    };
  };

  reader.readAsDataURL(file);
}
function forgotPassword(){
  let email = prompt("Enter your registered Email:");
  if(!email) return;

  email = email.toLowerCase().trim();

  // ===== ADMIN RESET =====
  if(role === "admin"){
    let a = JSON.parse(localStorage.getItem("ADMIN"));

    if(!a || a.email !== email){
      alert("Admin email not found");
      return;
    }

    let name = prompt("Enter Admin Name:");
    if(a.name !== name){
      alert("Name not match");
      return;
    }

    let newPass = prompt("Enter New Password:");
    if(!newPass || newPass.length < 4){
      alert("Minimum 4 characters required");
      return;
    }

    a.pass = hash(newPass);
    localStorage.setItem("ADMIN", JSON.stringify(a));

    alert("Admin password reset successful ✅");
    return;
  }

  // ===== USER RESET =====
  let foundUser = null;

  Object.keys(localStorage)
    .filter(k => k.startsWith("user_"))
    .forEach(k=>{
      let u = JSON.parse(localStorage[k] || "{}");
      if(u.email === email){
        foundUser = {key:k, data:u};
      }
    });

  if(!foundUser){
    alert("User not found");
    return;
  }

 let userid = prompt("Enter your User ID:");
if(foundUser.key !== "user_" + userid){
  alert("User ID not match");
  return;
}

  let newPass = prompt("Enter New Password:");
  if(!newPass || newPass.length < 4){
    alert("Minimum 4 characters required");
    return;
  }

  foundUser.data.pass = hash(newPass);
  localStorage.setItem(foundUser.key, JSON.stringify(foundUser.data));

  alert("User password reset successful ✅");
}

function getDeadlineColor(deadline){
 if(!deadline) return "";
 let today = new Date();
 today.setHours(0,0,0,0); // remove time
 let d = new Date(deadline);
 d.setHours(0,0,0,0);
 if(d < today) return "red";      // expired
 if(d.getTime() === today.getTime()) return "orange"; // today
 return "green"; 
}

 return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

function hash(str){
  let h = 0;
  for(let i=0;i<str.length;i++){
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return h.toString();
}

function renderOverview(){
  let pFilter = document.getElementById("filterPriority").value;
 let search = document.getElementById("searchUser").value.toLowerCase().trim();
 let container = document.getElementById("adminTasks");
 container.innerHTML = "";
 let found = false;

 Object.keys(localStorage)
 .filter(k=>k.startsWith("task_"))
 .forEach(k=>{
   let userid = k.replace("task_","");
   let user = JSON.parse(localStorage.getItem("user_" + userid) || "{}");
   let name = user.name || "Unknown";

   if(search && !userid.toLowerCase().includes(search)) return;

   found = true;

   let list = JSON.parse(localStorage[k] || "[]");

   list.sort((a,b)=>{
     const order = {High:1, Medium:2, Low:3};
     return (order[a.priority] || 3) - (order[b.priority] || 3);
   });
let done = list.filter(t=>t.progress === 100).length;
   let percent = list.length ? Math.round(done/list.length*100) : 0;

   container.innerHTML += `
   <div style="margin-top:10px;padding:10px;border:1px solid #ddd;border-radius:10px">
     <div style="font-weight:600;font-size:14px">
       👤 ${name} (${userid}) - ${percent}%
     </div>
     <div class="progress"><div style="width:${Math.max(percent,2)}%"></div></div>
   `;

   list.forEach((t,i)=>{
    if(pFilter && t.priority !== pFilter) return;

     container.innerHTML += `
      <div class="task ${t.progress === 100 ? 'done' : ''}">
         <div>
           <span class="task-text">${t.text}</span>
           <br>
           <small style="color:${
             t.priority==="High"?"red":
             t.priority==="Medium"?"orange":"green"
           }">
           Priority: ${t.priority || "Low"}
           </small>
           <div class="time">
             ${new Date(t.time).toLocaleString()}
             ${t.deadline ? `<br><b style="color:${getDeadlineColor(t.deadline)}">
             Deadline: ${t.deadline}
             </b>` : ""}
           </div>

function getUserProgress(tasks){
  if(tasks.length === 0) return 0;
  let total = 0;
tasks.forEach(t=>{
  if(t.progress === 50) total += 0.5;
  if(t.progress === 100) total += 1;
});
return Math.round((total / tasks.length) * 100);
}

function renderUserTasks(){
 let c = JSON.parse(localStorage.current || "null");
 if(!c) return;
 let k="task_"+c.userid.toLowerCase();
let d = JSON.parse(localStorage[k]||"[]");
// SORT BY PRIORITY
d.sort((a,b)=>{
const order = {High:1, Medium:2, Low:3};
return (order[a.priority] || 3) - (order[b.priority] || 3);
});
let updated = false;
d.forEach(t=>{
  if(!t.priority || !["Low","Medium","High"].includes(t.priority)){
    t.priority = "Low";
    updated = true;
  }
});

if(updated){
  localStorage[k] = JSON.stringify(d);
}
let percent = getUserProgress(d);

// 🎯 Convert to steps
let stepPercent = 0;
if(percent > 0 && percent <= 20) stepPercent = 20;
else if(percent <= 40) stepPercent = 40;
else if(percent <= 60) stepPercent = 60;
else if(percent <= 80) stepPercent = 80;
else if(percent > 80) stepPercent = 100;

// ❗ FIRST CLEAR
userTasks.innerHTML = "";

// 🎯 Progress UI
userTasks.innerHTML += `
<div style="
  margin-bottom:10px;
  padding:10px;
  background:#f5f5f5;
  border-radius:10px;
">
  <b>📊 Progress: ${stepPercent}%</b>
  <div style="
    height:8px;
    background:#ddd;
    border-radius:10px;
    margin-top:5px;
    overflow:hidden;
  ">
    <div style="
      height:100%;
      width:${stepPercent}%;
      background:linear-gradient(90deg,#4caf50,#2196f3);
      transition:0.5s;
    "></div>
  </div>
</div>
`;

 d.forEach((t,i)=>{
    if(t.deadline){
    let now = new Date();
    let deadline = new Date(t.deadline);

    if(deadline - now < 86400000 && t.progress !== 100 && !t.warned){
      showToast("⚠ Task deadline near: " + t.text, "error");

      t.warned = true; // mark as shown
    }
  }
let isOverdue = t.deadline && getDeadlineColor(t.deadline)==="red";
  userTasks.innerHTML+=`
  <div class="task ${t.progress === 100?'done':''} ${isOverdue?'overdue':''}">
   <div>
    <span class="task-text">${t.text}</span>
<br>
<small style="color:${
  t.priority==="High"?"red":  
  t.priority==="Medium"?"orange":"green"
}">
Priority: ${t.priority || "Low"}
</small>
    <div class="time">
     ${new Date(t.time).toLocaleString()}
     ${t.deadline ? `<br><b style="color:${getDeadlineColor(t.deadline)}">
     Deadline: ${t.deadline}
     </b>` : ""}
    <br>
<small style="font-weight:600;color:${
  t.progress===100 ? "#4caf50" :
  t.progress===50 ? "#ff9800" : "#999"
}">
${
  t.progress===100 ? "✅ Completed" :
  t.progress===50 ? "🟡 Half Done" :
  "⏳ Pending"
}
</small>
    </div>
   </div>
<div>
<button class="small-btn" onclick="doneTask('${k}',${i})">
  ${t.progress===50 ? "Complete" : "Half Done"}
</button>

<button class="small-btn red" onclick="deleteUserTask('${k}',${i})">Delete</button>
  </div>`;
 });
localStorage[k] = JSON.stringify(d);

 if(d.length===0){
  userTasks.innerHTML=`
  <div style="text-align:center;color:#777;margin-top:20px">
   No tasks assigned yet
  </div>`;
 }
}

   "Edit Priority (Low / Medium / High):",
   task.priority || "Low"
 );

              newPriority.slice(1).toLowerCase();

let adminWatcher = null;
function startAdminLiveNotification(){
  clearInterval(adminWatcher);
let last = localStorage.getItem("admin_notifications") || "[]";
  adminWatcher = setInterval(()=>{
 let current = localStorage.getItem("admin_notifications") || "[]";
 if(current !== last){
   last = current;
   loadAdminNotifications();
 let notes = JSON.parse(current);
  let latest = notes[notes.length - 1];

  if(latest){
    showToast(latest.text, "info");

    if(!window.lastAdminSound || Date.now() - window.lastAdminSound > 2000){
      let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
      audio.play();
      window.lastAdminSound = Date.now();
    }
  }
 }
},4000);
}

function getUsers(){
 return Object.keys(localStorage).filter(k=>k.startsWith("user_"));
}

function getTasks(){
 return Object.keys(localStorage).filter(k=>k.startsWith("task_"));
}

function openWeeklyReport(){
 show("weeklyPage");

}

function getWeekRange(){
  let now = new Date();
  let day = now.getDay();
  let diff = now.getDate() - day + (day === 0 ? -6 : 1);

  let start = new Date(now.setDate(diff));
  start.setHours(0,0,0,0);

  let end = new Date(start);
  end.setDate(start.getDate() + 6);
  end.setHours(23,59,59,999);

  return {start, end};
}

function isThisWeek(dateStr){
 if(!dateStr) return false;
 let d = new Date(dateStr);
 let {start,end} = getWeekRange();
 return d >= start && d <= end;
}

function renderWeeklyReport(){
let statusFilter = document.getElementById("filterStatusWeekly")?.value;
  let search = (document.getElementById("searchWeeklyUser")?.value || "")
                .toLowerCase()
                .trim();

  let box = document.getElementById("weeklyData");
  box.innerHTML = "";

  let users = Object.keys(localStorage).filter(k=>{
    if(!k.startsWith("user_")) return false;
    try{
      let u = JSON.parse(localStorage[k]);
      return u && u.name;
    }catch{
      return false;
    }
  });

  if(users.length === 0){
    box.innerHTML = "<p style='text-align:center;color:#777'>No data available</p>";
    return;
  }

  // ✅ WEEK RANGE
  let today = new Date();
  let start = new Date(today);
  let day = start.getDay();
  let diff = start.getDate() - day + (day === 0 ? -6 : 1);

  start.setDate(diff);
  start.setHours(0,0,0,0);

  let end = new Date(start);
  end.setDate(start.getDate() + 6);
  end.setHours(23,59,59,999);

  let ranking = [];

  users.forEach(uKey=>{
    let userid = uKey.replace("user_","");
    if(search && !userid.toLowerCase().includes(search)) return;

    let user = JSON.parse(localStorage[uKey] || "{}");
    let name = user.name || "Unknown User";

    let tasks = JSON.parse(localStorage["task_"+userid] || "[]");

    let weeklyTasks = tasks.filter(t=>{
      if(!t.time) return false;
      let d = new Date(t.time);
      if(isNaN(d.getTime())) return false;
      return d >= start && d <= end;
    });

    let completed = weeklyTasks.filter(t=>t.progress === 100).length;
    let pending = weeklyTasks.length - completed;

    let overdue = weeklyTasks.filter(t=>{
      if(!t.deadline || t.progress === 100) return false;
      return new Date(t.deadline) < new Date();
    }).length;

    let percent = weeklyTasks.length 
      ? Math.round((completed / weeklyTasks.length) * 100)
      : 0;

    ranking.push({name, percent});

    let label = percent >= 80 ? "🔥 Excellent" :
                percent >= 50 ? "👍 Good" :
                "⚠ Needs Improvement";

    box.innerHTML += `
    <div style="
      margin:14px 0;
      padding:16px;
      border-radius:16px;
      background:#ffffff;
      box-shadow:0 10px 25px rgba(0,0,0,0.15);
      border-left:6px solid ${
        percent >= 80 ? "#4caf50" :
        percent >= 50 ? "#ff9800" :
        "#e53935"
      };
    ">

      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:16px">${name}</div>
          <div style="font-size:12px;color:#777">ID: ${userid}</div>
        </div>
        <div style="
          padding:6px 12px;
          border-radius:20px;
          font-weight:600;
          background:${
            percent >= 80 ? "#e8f5e9" :
            percent >= 50 ? "#fff3e0" :
            "#ffebee"
          };
          color:${
            percent >= 80 ? "#2e7d32" :
            percent >= 50 ? "#ef6c00" :
            "#c62828"
          };
        ">
          ${percent}%
        </div>
      </div>

      <div style="margin-top:10px;font-size:13px">
        📌 Total: <b>${weeklyTasks.length}</b> |
        ✅ Done: <b style="color:#4caf50">${completed}</b> |
        ⏳ Pending: <b style="color:#ff9800">${pending}</b> |
        🔴 Overdue: <b style="color:#e53935">${overdue}</b>
      </div>

      <div style="margin-top:10px;font-size:12px;color:#555">
        🕒 Last Task: ${
          weeklyTasks.length 
          ? new Date(weeklyTasks[weeklyTasks.length-1].time).toLocaleString()
          : "No tasks"
        }
      </div>

      <div style="margin-top:10px;font-size:12px">
        ${
          weeklyTasks.slice(-2).map(t => `
            <div>
              • ${t.text} ${t.progress === 100 ? "✅" : "⏳"}
            </div>
          `).join("")
        }
      </div>

      <div style="
        margin-top:12px;
        height:8px;
        background:#eee;
        border-radius:10px;
        overflow:hidden
      ">
        <div style="
          height:100%;
          width:${Math.max(percent,5)}%;
          background:linear-gradient(90deg,#42a5f5,#7e57c2);
        "></div>
      </div>

      <div style="margin-top:8px;font-size:12px;color:#555">
        ${label}
      </div>

    </div>
    `;
  });

  // 🏆 TOP PERFORMER
  ranking.sort((a,b)=>b.percent - a.percent);

  if(ranking.length){
    box.innerHTML = `
    <div style="
      padding:12px;
      background:#fff8e1;
      border-radius:12px;
      margin-bottom:10px;
      text-align:center;
      font-weight:600;
    ">
      🏆 Top Performer: ${ranking[0].name} (${ranking[0].percent}%)
    </div>
    ` + box.innerHTML;
  }
}

async function downloadWeeklyPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(16);
  doc.text("Weekly Task Report", 14, 15);

  // ✅ WEEK RANGE
  let today = new Date();
  let start = new Date(today);
  let day = start.getDay();
  let diff = start.getDate() - day + (day === 0 ? -6 : 1);

  start.setDate(diff);
  start.setHours(0,0,0,0);

  let end = new Date(start);
  end.setDate(start.getDate() + 6);
  end.setHours(23,59,59,999);

  // ✅ FILTER USERS PROPERLY
  let users = Object.keys(localStorage).filter(k=>{
    if(!k.startsWith("user_")) return false;
    try{
      let u = JSON.parse(localStorage[k]);
      return u && u.name;
    }catch{
      return false;
    }
  });

  let tableData = [];

  users.forEach(uKey=>{
    let userid = uKey.replace("user_","");

    if(userid.startsWith("notifications")) return;

    let user = JSON.parse(localStorage[uKey] || "{}");
    if(!user.name) return;

    let name = user.name;

    let tasks = JSON.parse(localStorage["task_"+userid] || "[]");

    let weeklyTasks = tasks.filter(t=>{
      let d = new Date(t.time);
      if(isNaN(d.getTime())) return false;
      return d >= start && d <= end;
    });

    let completed = weeklyTasks.filter(t=>t.progress === 100).length;
    let pending = weeklyTasks.length - completed;
    let percent = weeklyTasks.length 
      ? Math.round((completed / weeklyTasks.length) * 100)
      : 0;

    // ✅ PUSH ROW DATA
    tableData.push([
      name,
      userid,
      weeklyTasks.length,
      completed,
      pending,
      percent + "%"
    ]);
  });

  // ✅ CREATE TABLE
  doc.autoTable({
    startY: 25,
    head: [["User Name", "User ID", "Total", "Done", "Pending", "Performance"]],
    body: tableData,

    styles: {
      halign: "center",
      fontSize: 10
    },

    headStyles: {
      fillColor: [66, 165, 245], // blue
      textColor: 255,
      fontStyle: "bold"
    },

    alternateRowStyles: {
      fillColor: [240, 240, 240]
    },

    columnStyles: {
      0: { halign: "left" },
      1: { halign: "center" }
    }
  });

  doc.save("Weekly_Report_Table.pdf");
}

function safeJSON(key, fallback){
  try{
    return JSON.parse(localStorage.getItem(key)) || fallback;
  }catch{
    return fallback;
  }
}

function backupData(){
 let data = JSON.stringify(localStorage);
 let blob = new Blob([data], {type:"application/json"});
 let a = document.createElement("a");
 a.href = URL.createObjectURL(blob);
 a.download = "backup.json";
 a.click();
}
function safeSet(key, data){
  try{
    localStorage.setItem(key, data);
  }catch(e){
    alert("Storage full! Please backup data.");
  }
}
